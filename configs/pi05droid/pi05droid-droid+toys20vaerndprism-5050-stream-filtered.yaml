# pi05droid-droid+toys20vaerndprism-5050-stream-filtered
model:
  type: pi0
  action_horizon: 16
  max_token_len: 200
  pi05: true
  discrete_state_input: true
weight_loader:
  type: checkpoint
  params_path: gs://openpi-assets/checkpoints/pi05_droid/params
data:
  type: lerobot_droid
  repo_id:
    - lerobot/droid_1.0.1
    - SamratSahoo/toys20_vae_rnd_prism
  assets:
    assets_dir: gs://openpi-assets/checkpoints/pi05_droid/assets
    asset_id: droid
  base_config:
    prompt_from_task: true
  streaming: true
  nonidle_filter_paths:
    lerobot/droid_1.0.1: filters/lerobot_droid_1.0.1.json
    SamratSahoo/toys20_vae_rnd_prism: filters/SamratSahoo_toys20_vae_rnd_prism.json
  sampling_weights:
    lerobot/droid_1.0.1: 0.5
    SamratSahoo/toys20_vae_rnd_prism: 0.5
batch_size: 256
num_train_steps: 20000
save_interval: 10000
