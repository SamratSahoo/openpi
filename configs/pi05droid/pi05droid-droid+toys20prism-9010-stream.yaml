# pi05droid-droid+toys20prism-9010-stream
model:
  type: pi0
  action_horizon: 16
  max_token_len: 200
  pi05: true
  discrete_state_input: true
weight_loader:
  type: checkpoint
  params_path: gs://openpi-assets/checkpoints/pi05_droid/params
data:
  type: lerobot_droid
  repo_id:
  - lerobot/droid_1.0.1
  - SamratSahoo/toys20_prism
  assets:
    assets_dir: gs://openpi-assets/checkpoints/pi05_droid/assets
    asset_id: droid
  base_config:
    prompt_from_task: true
  streaming: true
  nonidle_filter_paths:
    lerobot/droid_1.0.1: filters/lerobot_droid_1.0.1.json
  sampling_weights:
    lerobot/droid_1.0.1: 0.9
    SamratSahoo/toys20_prism: 0.1
batch_size: 256
num_train_steps: 20000
save_interval: 5000
