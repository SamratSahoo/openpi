# pi05_libero
model:
  type: pi0
  action_horizon: 10
  max_token_len: 200
  pi05: true
  discrete_state_input: false
weight_loader:
  type: checkpoint
  params_path: gs://openpi-assets/checkpoints/pi05_base/params
pytorch_weight_path: /path/to/your/pytorch_weight_path
lr_schedule:
  type: cosine_decay
  warmup_steps: 10000
  peak_lr: 5.0e-05
  decay_steps: 1000000
  decay_lr: 5.0e-05
ema_decay: 0.999
data:
  type: lerobot_libero
  repo_id: physical-intelligence/libero
  base_config:
    prompt_from_task: true
batch_size: 256
